<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explore</title>
</head>
<body>
    <div class="card">
        <img src="${cat.cat_image} alt="${cat.cat_name}" class="card-image" />
        <div class="card-text">
          <h2>${cat.cat_name}</h2>
          <p>Age: ${cat.cat_age}</p>
          <p>Gender: ${cat.cat_gender}</p>
          <p>${cat.cat_description}</p>
        </div>
    </div>
</body>
</html>
